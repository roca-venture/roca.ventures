<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#2A1F1A"/>
  <!-- Spotlight -->
  <path d="M400 0 L180 600 L620 600 Z" fill="#F5E8C0" opacity="0.08"/>
  <path d="M400 0 L250 600 L550 600 Z" fill="#F5E8C0" opacity="0.08"/>
  <path d="M400 0 L300 600 L500 600 Z" fill="#F5E8C0" opacity="0.1"/>
  <!-- Stage platform -->
  <rect x="150" y="470" width="500" height="30" rx="4" fill="#3A2E28"/>
  <rect x="120" y="498" width="560" height="12" rx="3" fill="#2E2420"/>
  <!-- Figure silhouette -->
  <!-- Head -->
  <circle cx="400" cy="290" r="35" fill="#F5E8C0"/>
  <!-- Body -->
  <path d="M375 325 Q365 380 360 450 L440 450 Q435 380 425 325 Z" fill="#F5E8C0"/>
  <!-- Arms up (presenting) -->
  <path d="M375 340 Q340 310 310 280" stroke="#F5E8C0" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M425 340 Q460 310 490 280" stroke="#F5E8C0" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Legs -->
  <path d="M380 450 Q375 465 370 470" stroke="#F5E8C0" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M420 450 Q425 465 430 470" stroke="#F5E8C0" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Audience dots (small heads) -->
  <circle cx="200" cy="540" r="12" fill="#4A3A34" opacity="0.8"/>
  <circle cx="240" cy="535" r="10" fill="#4A3A34" opacity="0.7"/>
  <circle cx="280" cy="542" r="11" fill="#4A3A34" opacity="0.8"/>
  <circle cx="320" cy="536" r="9" fill="#4A3A34" opacity="0.6"/>
  <circle cx="480" cy="538" r="11" fill="#4A3A34" opacity="0.8"/>
  <circle cx="520" cy="533" r="10" fill="#4A3A34" opacity="0.7"/>
  <circle cx="560" cy="540" r="12" fill="#4A3A34" opacity="0.8"/>
  <circle cx="600" cy="535" r="9" fill="#4A3A34" opacity="0.6"/>
  <!-- Floating words -->
  <text x="130" y="200" font-family="Georgia, serif" font-size="22" fill="#F5E8C0" opacity="0.3" transform="rotate(-8 130 200)">¿por qué?</text>
  <text x="550" y="180" font-family="Georgia, serif" font-size="18" fill="#F5E8C0" opacity="0.25" transform="rotate(5 550 180)">¿cómo?</text>
  <text x="80" y="380" font-family="Georgia, serif" font-size="16" fill="#F5E8C0" opacity="0.2">¿cuándo?</text>
  <text x="580" y="360" font-family="Georgia, serif" font-size="20" fill="#F5E8C0" opacity="0.25" transform="rotate(-3 580 360)">¿quién?</text>
</svg>
