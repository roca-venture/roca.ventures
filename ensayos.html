<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ensayos — roca.ventures</title>
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#EFEBE1;font-family:Archivo,system-ui,sans-serif;color:#2E3440;-webkit-font-smoothing:antialiased}
  a{color:#2E3440;text-decoration:none;transition:opacity .3s ease}
  a:hover{opacity:.55}
</style>
</helmet>
<header style="position:fixed;top:clamp(16px,3vw,26px);left:0;right:0;display:flex;justify-content:center;padding:0 clamp(16px,3vw,32px);z-index:40">
  <div style="display:flex;align-items:center;gap:clamp(14px,2vw,24px);padding:13px clamp(16px,2vw,24px);background:rgba(252,250,246,.86);border:1px solid rgba(46,52,64,.13);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)">
    <a href="/" style="font-family:'Instrument Serif',serif;font-size:19px;letter-spacing:.01em;color:#2E3440">roca&nbsp;<span style="font-style:italic;color:#8D9BB5">ventures</span></a>
    <span aria-hidden="true" style="width:1px;height:20px;background:rgba(46,52,64,.15)"></span>
    <nav aria-label="Principal" style="display:flex;gap:clamp(14px,1.8vw,24px);font:500 11px/1 Archivo,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#5b6470">
      <a href="ensayos.html" style="color:#2E3440">Ensayos</a>
      <a href="acerca.html">Acerca</a>
      <a href="inversiones.html">Inversiones</a>
    </nav>
  </div>
</header>

<main style="min-height:100vh;box-sizing:border-box;padding:clamp(120px,16vh,180px) clamp(24px,7vw,80px) 100px;display:flex;justify-content:center">
  <article style="width:100%;max-width:680px">
    <p style="margin:0 0 22px;font:500 11px/1 Archivo,sans-serif;letter-spacing:.24em;text-transform:uppercase;color:#9a9280">Ensayos</p>
    <h1 style="margin:0 0 18px;font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(2.1rem,5vw,3.4rem);line-height:1.05;color:#2E3440;text-wrap:balance">Escrito lentamente,<br>como cae la lluvia.</h1>
    <p style="margin:0 0 8px;font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(1.1rem,2vw,1.4rem);line-height:1.4;color:#6b6455;max-width:34ch">Notas sobre la constancia, el tiempo y lo que se construye gota a gota.</p>

    <div id="lista-ensayos" style="margin-top:clamp(40px,6vh,72px);border-top:1px solid rgba(46,52,64,.14)">
      <p style="padding:28px 0;color:#8a8272;font-family:'Instrument Serif',serif;font-style:italic">Cargando ensayos&hellip;</p>
    </div>
  </article>
</main>
<script>
(async function () {
  var cont = document.getElementById('lista-ensayos');
  function row(e) {
    return '<a href="articulo.html?e=' + encodeURIComponent(e.slug) + '" style="display:block;padding:28px 0;border-bottom:1px solid rgba(46,52,64,.14)">' +
      '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap">' +
      '<h2 style="margin:0;font-family:\'Instrument Serif\',serif;font-weight:400;font-size:clamp(1.4rem,2.6vw,1.9rem);line-height:1.15;color:#2E3440">' + e.titulo + '</h2>' +
      '<span style="font:500 12px/1 Archivo,sans-serif;letter-spacing:.06em;color:#a29a88;white-space:nowrap">' + e.fecha + '</span></div>' +
      '<p style="margin:10px 0 0;font-size:15px;line-height:1.55;color:#6b6455;max-width:56ch">' + e.resumen + '</p></a>';
  }
  try {
    var idx = await fetch('ensayos/index.json', { cache: 'no-cache' }).then(function (r) { return r.ok ? r.json() : []; });
    if (!idx.length) { cont.innerHTML = '<p style="padding:28px 0;color:#8a8272;font-family:\'Instrument Serif\',serif;font-style:italic">Aún no hay ensayos publicados.</p>'; return; }
    cont.innerHTML = idx.map(row).join('');
  } catch (e) {
    cont.innerHTML = '<p style="padding:28px 0;color:#8a8272;font-family:\'Instrument Serif\',serif;font-style:italic">No se pudieron cargar los ensayos.</p>';
  }
})();
</script>
</x-dc>
</body>
</html>
